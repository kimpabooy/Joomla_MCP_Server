<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Server</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>Welcome to the MCP Server!</h1>

    <div id="main-flex">
        <div id="response-box">
            <h3>Svar</h3>
            <div id="endpoint-response"></div>
        </div>

        <div id="chatbox">
            <div id="chatlog">
                <div class="chat-msg bot">Skriv in en <b>Endpoint</b> och tryck <b>Enter</b></div>
            </div>
            <form id="chatForm" autocomplete="off">
                <textarea id="endpointInput" placeholder="Skriv ett kommando..." rows="2" required></textarea>
            </form>
        </div>

        <div id="endpoints-box">
            <h3>Endpoints</h3>
            <ul id="endpoints-list">
                <li>Laddar...</li>
            </ul>
            <p>Extra: /clear, /help</p>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>

</html>
