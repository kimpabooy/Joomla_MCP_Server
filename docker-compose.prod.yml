services:
  app:
    container_name: joomla-mcp-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # Viktigt:
    # - RIKTIG PRODUKTION (server): sätt JOOMLA_SITE_URL/JOOMLA_API_URL till din riktiga domän/IP.
    # - LOKAL TEST av prod-fil på din dator: localhost i containern pekar på containern själv.
    #   Använd då JOOMLA_SITE_CHECK_URL=http://host.docker.internal:8080 i .env
    #   så statusindikatorn kan nå Joomla som kör på hosten.
    ports:
      - "8000:8000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/joomla-status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
