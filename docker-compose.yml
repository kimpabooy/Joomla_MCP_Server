services:
  app:
    container_name: joomla-mcp-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/joomla-status', timeout=8)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


